<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéAPI - Pesquisa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="search-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pokémon_logo.svg" alt="Pokémon Logo" class="logo">

        <h1>Pokédex</h1>
        <p>Encontre informações sobre qualquer Pokémon!</p>

        <form action="{{ url_for('principal.search') }}" method="POST" autocomplete="off">

            <div class="autocomplete-container">
                <input type="text" id="searchInput" name="pokemon" placeholder="Ex: pikachu..." required>
                <div id="suggestionsBox" class="suggestions-box"></div>
            </div>

            <button type="submit">Pesquisar</button>
        </form>
    </div>

    <script>
        const todosPokemons = {{ lista_nomes|tojson }};
    </script>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
